<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Quiz App</title>
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>

    <!--  Outer wrapper centres the card on screen  -->
    <div class="quiz-wrapper">

      <!-- START SCREEN ,Shown first. Hidden once the quiz begins.-->
      <div id="start-screen" class="screen">
        <div class="screen__icon">&#x1F9E0;</div>
        <h1 class="screen__title">Knowledge Quiz</h1>
        <p class="screen__subtitle">10 questions &middot; Multiple choice &middot; Instant feedback</p>
        <button id="start-btn" class="btn btn--primary">Start Quiz</button>
      </div>

      <!-- QUIZ SCREEN ,The active quiz view. Hidden on start/results screens. -->
    
      <div id="quiz-screen" class="screen screen--hidden">

        <!-- Top bar: question counter + score -->
        <header class="quiz-header">
          <span id="question-counter" class="quiz-header__counter">Question 1 of 10</span>
          <span id="score-display"    class="quiz-header__score">Score: 0</span>
        </header>

        <!-- Progress bar -->
        <div class="progress-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100">
          <div id="progress-fill" class="progress-bar__fill"></div>
        </div>

        <!-- Question text -->
        <h2 id="question-text" class="question-text"></h2>

        <!-- Answer options — JS will populate these buttons -->
        <div id="options-grid" class="options-grid">
          <!-- Four <button class="option-btn"> elements injected by JS -->
        </div>

        <!-- Feedback banner (correct / incorrect) -->
        <div id="feedback" class="feedback feedback--hidden">
          <span id="feedback-icon"  class="feedback__icon"></span>
          <span id="feedback-text"  class="feedback__text"></span>
        </div>

        <!-- Next Question button — disabled until an answer is chosen -->
        <button id="next-btn" class="btn btn--primary btn--next" disabled>
          Next Question
        </button>

      </div>

      <!-- ══ RESULTS SCREEN, Shown after the last question is answered and Next is clicked.-->
      <div id="results-screen" class="screen screen--hidden">
        <div id="results-icon"    class="screen__icon"></div>
        <h1 class="screen__title">Quiz Complete!</h1>
        <p id="results-summary"  class="results__summary"></p>
        <div class="results__score-card">
          <span id="results-score" class="results__big-score"></span>
          <span class="results__label">out of 10</span>
        </div>
        <p id="results-message"  class="results__message"></p>
        <button id="restart-btn" class="btn btn--primary">Restart Quiz</button>
      </div>

    </div><!-- /.quiz-wrapper -->

    <script src="./src/script.js"></script>
  </body>
</html>
